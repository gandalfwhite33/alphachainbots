services:
  - type: web
    name: alphachainbots
    runtime: python
    rootDir: bot
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    plan: free

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TESTNET
        value: "true"
      - key: PRIVATE_KEY
        sync: false        # secreto — lo introduces a mano en el panel
      - key: ACCOUNT_ADDRESS
        value: ""
